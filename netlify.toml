[build]
  publish = "."

# Netlify Forms — enabled by the data-netlify="true" attribute in the HTML.
# Submissions appear in the Netlify dashboard under Forms.
# Configure email notifications in: Forms > contact > Settings > Form notifications

# ============================================================
# Clean URL canonicalization: /xxx.html -> /xxx
# ============================================================

[[redirects]]
  from = "/services.html"
  to = "/services"
  status = 301

[[redirects]]
  from = "/about.html"
  to = "/about"
  status = 301

[[redirects]]
  from = "/contact.html"
  to = "/contact"
  status = 301

[[redirects]]
  from = "/index.html"
  to = "/"
  status = 301

[[redirects]]
  from = "/diy-ai-training.html"
  to = "/diy-ai-training"
  status = 301

# ============================================================
# Retired AI consulting pages — 301 to /diy-ai-training.
# Files remain in the repo for historical reference but are not
# reachable via the public site. Quiet rebrand, April 2026.
# ============================================================

[[redirects]]
  from = "/ai-consulting"
  to = "/diy-ai-training"
  status = 301
  force = true

[[redirects]]
  from = "/ai-consulting/teams"
  to = "/diy-ai-training"
  status = 301
  force = true

[[redirects]]
  from = "/ai-consulting/you"
  to = "/diy-ai-training"
  status = 301
  force = true

[[redirects]]
  from = "/ai-consulting.html"
  to = "/diy-ai-training"
  status = 301
  force = true

[[redirects]]
  from = "/ai-consulting-teams"
  to = "/diy-ai-training"
  status = 301
  force = true

[[redirects]]
  from = "/ai-consulting-teams.html"
  to = "/diy-ai-training"
  status = 301
  force = true

[[redirects]]
  from = "/ai-consulting-you"
  to = "/diy-ai-training"
  status = 301
  force = true

[[redirects]]
  from = "/ai-consulting-you.html"
  to = "/diy-ai-training"
  status = 301
  force = true

# ============================================================
# Custom 404
# ============================================================

[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404

# ============================================================
# Security and performance headers
# ============================================================

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    X-XSS-Protection = "1; mode=block"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
